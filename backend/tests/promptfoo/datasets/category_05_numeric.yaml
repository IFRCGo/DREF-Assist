# Category 5: Numeric Confusion & Units
# Tests 5.1, 5.2, 5.3

# Test 5.1 — Mixed Numeric Formats (Tier 2 component)
- vars:
    test_input: >
      10k households displaced. Relief fund of 500K CHF. Approximately
      2.5 thousand children need vaccination. Medical costs estimated
      at $150,000 USD or roughly 135,000 CHF.
    form_state_before: "{}"
    conversation_history: "[]"
    expected_behaviour: >
      10k→10000, 500K→500000, 2.5 thousand→2500. Budget is 500K CHF
      (the relief fund). Medical costs (135K CHF) are a separate line item.
      Do not sum all currencies or conflate sub-items with total budget.
    ground_truth: |
      Extractable fields and correct values:
      - operation.requested_amount_chf: 500000 (main relief fund, explicitly stated in CHF)

      Fields that must remain null:
      - operation_overview.country (not specified)
      - operation_overview.disaster_type (not specified)
      - event_detail.total_affected_population (10k households ≠ 10k people — do not assume)

      Required behaviours:
      - Informal notation (10k, 500K, 2.5 thousand) correctly parsed to numbers
      - CHF figure used for budget (500,000), not USD
      - Currencies not summed or averaged (500K + 135K ≠ 635K)
      - "Households" not conflated with "people" for population fields
  metadata:
    test_id: "5.1"
    category: "Budget and numeric calculation"
    threshold: "22/25"

# Test 5.2 — Percentage Conversion
- vars:
    test_input: >
      80% of village affected. Village population: 2,500.
      60% of people need immediate shelter.
    form_state_before: "{}"
    conversation_history: "[]"
    expected_behaviour: >
      80% of 2,500 = 2,000 affected. 60% of 2,000 = 1,200 need shelter.
      Show calculations.
    ground_truth: |
      Extractable fields and correct values:
      - event_detail.total_affected_population: 2000
      - operation.targeted_total: 1200

      Fields that must remain null:
      - operation_overview.country (not specified)

      Required behaviours:
      - Percentage calculations shown (80% × 2500 = 2000, 60% × 2000 = 1200)
      - Both results clearly explained
  metadata:
    test_id: "5.2"
    category: "Budget and numeric calculation"
    threshold: "22/25"

# Test 5.3 — Ranges and Approximations
- vars:
    test_input: >
      Between 5,000 and 7,000 affected. Around 1,200–1,800 need shelter.
      Budget CHF 200,000 to 300,000.
    form_state_before: "{}"
    conversation_history: "[]"
    expected_behaviour: >
      Preserve ranges. Note midpoints. Flag all as approximate.
    ground_truth: |
      Extractable fields and correct values:
      - event_detail.total_affected_population: range 5000-7000 (approximate)
      - operation.targeted_total: range 1200-1800 (approximate)
      - operation.requested_amount_chf: range 200000-300000 (approximate)

      Fields that must remain null:
      - operation_overview.country (not specified)

      Required behaviours:
      - Ranges preserved (not averaged to single value)
      - All values flagged as approximate
      - User asked to confirm specific numbers
  metadata:
    test_id: "5.3"
    category: "Noisy input"
    threshold: "18/25"
