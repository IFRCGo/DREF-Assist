[build-system]requires = ["setuptools>=61.0", "wheel"]build-backend = "setuptools.build_meta"[project]name = "dref-evaluation"version = "1.0.0"description = "DREF Quality Evaluation Module for IFRC GO Platform"readme = "README.md"license = {text = "MIT"}authors = [    {name = "IFRC", email = "go-support@ifrc.org"}]classifiers = [    "Development Status :: 4 - Beta",    "Environment :: Web Environment",    "Framework :: Django :: 4.0",    "Intended Audience :: Developers",    "License :: OSI Approved :: MIT License",    "Operating System :: OS Independent",    "Programming Language :: Python :: 3",    "Programming Language :: Python :: 3.10",    "Programming Language :: Python :: 3.11",    "Programming Language :: Python :: 3.12",]requires-python = ">=3.10"dependencies = [    "Django>=4.0",    "djangorestframework>=3.14",][project.optional-dependencies]dev = [    "pytest>=7.0",    "pytest-django>=4.5",    "pytest-cov>=4.0",][project.urls]"Homepage" = "https://github.com/IFRCGo/go-api""Bug Tracker" = "https://github.com/IFRCGo/go-api/issues"[tool.setuptools.packages.find]where = ["."]include = ["dref_evaluation*"][tool.pytest.ini_options]DJANGO_SETTINGS_MODULE = "main.settings"python_files = ["test_*.py", "*_test.py"]addopts = "-v --tb=short"[tool.coverage.run]source = ["dref_evaluation"]omit = ["*/migrations/*", "*/tests/*"][tool.coverage.report]exclude_lines = [    "pragma: no cover",    "def __repr__",    "raise NotImplementedError",]
